<div class="min-h-screen max-w-full overflow-x-hidden bg-[#f1f3f8] antialiased">
  <!-- Topbar -->
  <app-topbar [canToggleSidebar]="showSidebar()" (toggleSidebar)="toggleSidebar()"></app-topbar>

  <!-- Sidebar -->
  @if (showSidebar()) {
    <app-sidebar 
      [isOpen]="isSidebarOpen()" 
      (closeSidebar)="closeSidebar()"
    ></app-sidebar>
  }

  <!-- Main Content -->
  @if (showSidebar()) {
    <main class="h-auto w-full max-w-full min-w-0 overflow-x-hidden px-4 pb-6 pt-20 md:pl-[17.5rem] md:pr-6 md:pt-24">
      <router-outlet />
    </main>
  } @else {
    <main class="h-auto w-full max-w-full min-w-0 overflow-x-hidden px-4 pb-6 pt-20 md:px-6 md:pt-24">
      <router-outlet />
    </main>
  }

  <!-- Backdrop for mobile -->
  @if (showSidebar() && isSidebarOpen()) {
    <div 
      class="fixed inset-0 z-30 bg-gray-900/50 dark:bg-gray-900/80 md:hidden"
      (click)="closeSidebar()"
    ></div>
  }
</div>
